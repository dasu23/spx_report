<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Code Review Report</title>
  <style>
    :root {
      --bg: #f4f7f5;
      --card: #ffffff;
      --text: #1a2b22;
      --muted: #5b6f63;
      --border: #d9e3dc;
      --heading: #113326;
      --accent: #0f766e;
      --critical-bg: #ffe7e7;
      --critical-text: #8b1a1a;
      --major-bg: #ffedd9;
      --major-text: #8a3a07;
      --minor-bg: #fff4cc;
      --minor-text: #7a4f00;
      --info-bg: #e5f0ff;
      --info-text: #1f4a82;
      --chip-bg: #e8efea;
      --shadow: 0 10px 30px rgba(17, 51, 38, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 92% 6%, rgba(20, 128, 110, 0.14), transparent 38%),
        radial-gradient(circle at 8% 3%, rgba(245, 158, 11, 0.10), transparent 32%),
        var(--bg);
      line-height: 1.55;
    }

    .page {
      max-width: 1160px;
      margin: 24px auto 40px;
      padding: 0 16px;
    }

    .hero {
      background: linear-gradient(130deg, #0f3b2f, #135545 52%, #1a7f6b);
      color: #e9fff6;
      border-radius: 16px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0.1px;
    }

    .hero-meta {
      margin: 0;
      font-size: 14px;
      opacity: 0.95;
    }

    .summary {
      background: var(--card);
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .summary h2,
    .section-title {
      margin: 0 0 12px;
      font-size: 18px;
      color: var(--heading);
    }

    .summary p {
      margin: 0 0 12px;
    }

    .risk-line {
      margin: 0 0 10px;
      font-weight: 600;
      color: var(--accent);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: var(--chip-bg);
      color: #2d4a3d;
      border: 1px solid transparent;
    }

    .critical { background: var(--critical-bg); color: var(--critical-text); border-color: #f8b9b9; }
    .major { background: var(--major-bg); color: var(--major-text); border-color: #f8cf9f; }
    .minor { background: var(--minor-bg); color: var(--minor-text); border-color: #f0dd9f; }
    .info { background: var(--info-bg); color: var(--info-text); border-color: #bfd6f9; }

    .file-block {
      margin: 14px 0 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .file-block h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--heading);
      word-break: break-all;
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px;
      vertical-align: top;
      text-align: left;
      font-size: 13px;
    }

    th {
      position: sticky;
      top: 0;
      background: #edf5f0;
      color: #244436;
      font-weight: 700;
      z-index: 1;
    }

    tbody tr:nth-child(even) { background: #fbfdfc; }
    tbody tr:last-child td { border-bottom: none; }

    .empty {
      padding: 18px;
      border: 1px dashed #b8c9bf;
      border-radius: 14px;
      color: var(--muted);
      background: #f9fcfa;
    }

    @media (max-width: 900px) {
      .hero h1 { font-size: 22px; }
      .summary,
      .file-block { padding: 12px; }
      th, td { padding: 8px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>AI Code Review 报告</h1>
      <p class="hero-meta">服务: dms-api | 生成时间: 2026-03-13 11:28:40</p>
    </header>

    <section class="summary">
      <h2>总体结论</h2>
      <p>代码质量良好，未发现重大问题。变更仅在事务内提前持久化 routes 以获取主键，结合当前 JPA `IDENTITY` 主键策略和事务回滚语义，没有发现安全性、数据一致性、并发或类型安全方面的回归风险。</p>
      <div class="chips">
        <span class="chip critical">Critical: 0</span>
        <span class="chip major">Major: 0</span>
        <span class="chip minor">Minor: 0</span>
        <span class="chip info">Info: 0</span>
        <span class="chip">Total: 0</span>
      </div>
    </section>

    <h2 class="section-title">审查发现</h2>
    <div class="empty">当前分支未发现高风险问题，或无可审查 diff。</div>
  </div>
  <script>
    (function () {
      var chips = document.querySelectorAll('table .chip');
      for (var i = 0; i < chips.length; i++) {
        chips[i].textContent = chips[i].textContent.toUpperCase();
      }
    })();
  </script>
</body>
</html>
