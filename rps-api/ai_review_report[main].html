<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Code Review Report</title>
  <style>
    :root {
      --bg: #f4f7f5;
      --card: #ffffff;
      --text: #1a2b22;
      --muted: #5b6f63;
      --border: #d9e3dc;
      --heading: #113326;
      --accent: #0f766e;
      --critical-bg: #ffe7e7;
      --critical-text: #8b1a1a;
      --major-bg: #ffedd9;
      --major-text: #8a3a07;
      --minor-bg: #fff4cc;
      --minor-text: #7a4f00;
      --info-bg: #e5f0ff;
      --info-text: #1f4a82;
      --chip-bg: #e8efea;
      --shadow: 0 10px 30px rgba(17, 51, 38, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 92% 6%, rgba(20, 128, 110, 0.14), transparent 38%),
        radial-gradient(circle at 8% 3%, rgba(245, 158, 11, 0.10), transparent 32%),
        var(--bg);
      line-height: 1.55;
    }

    .page {
      max-width: 1160px;
      margin: 24px auto 40px;
      padding: 0 16px;
    }

    .hero {
      background: linear-gradient(130deg, #0f3b2f, #135545 52%, #1a7f6b);
      color: #e9fff6;
      border-radius: 16px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0.1px;
    }

    .hero-meta {
      margin: 0;
      font-size: 14px;
      opacity: 0.95;
    }

    .summary {
      background: var(--card);
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .summary h2,
    .section-title {
      margin: 0 0 12px;
      font-size: 18px;
      color: var(--heading);
    }

    .summary p {
      margin: 0 0 12px;
    }

    .risk-line {
      margin: 0 0 10px;
      font-weight: 600;
      color: var(--accent);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: var(--chip-bg);
      color: #2d4a3d;
      border: 1px solid transparent;
    }

    .critical { background: var(--critical-bg); color: var(--critical-text); border-color: #f8b9b9; }
    .major { background: var(--major-bg); color: var(--major-text); border-color: #f8cf9f; }
    .minor { background: var(--minor-bg); color: var(--minor-text); border-color: #f0dd9f; }
    .info { background: var(--info-bg); color: var(--info-text); border-color: #bfd6f9; }

    .file-block {
      margin: 14px 0 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .file-block h3 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--heading);
      word-break: break-all;
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px;
      vertical-align: top;
      text-align: left;
      font-size: 13px;
    }

    th {
      position: sticky;
      top: 0;
      background: #edf5f0;
      color: #244436;
      font-weight: 700;
      z-index: 1;
    }

    tbody tr:nth-child(even) { background: #fbfdfc; }
    tbody tr:last-child td { border-bottom: none; }

    .empty {
      padding: 18px;
      border: 1px dashed #b8c9bf;
      border-radius: 14px;
      color: var(--muted);
      background: #f9fcfa;
    }

    /* 趋势图表样式 */
    .trends-section {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .trends-section.visible {
      display: block;
    }

    .trends-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 12px;
    }

    .trend-chart {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fafcfb;
    }

    .trend-chart h4 {
      margin: 0 0 10px;
      font-size: 14px;
      color: var(--heading);
    }

    .trend-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }

    .trend-bar-label {
      width: 70px;
      font-size: 12px;
      color: var(--muted);
    }

    .trend-bar-track {
      flex: 1;
      height: 16px;
      background: #e8efea;
      border-radius: 8px;
      overflow: hidden;
    }

    .trend-bar-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.3s ease;
    }

    .trend-bar-fill.critical { background: var(--critical-text); }
    .trend-bar-fill.major { background: var(--major-text); }
    .trend-bar-fill.minor { background: var(--minor-text); }
    .trend-bar-fill.info { background: var(--info-text); }

    .trend-bar-value {
      width: 30px;
      font-size: 12px;
      font-weight: 600;
      text-align: right;
    }

    .trend-timeline {
      display: flex;
      gap: 4px;
      margin-top: 12px;
      height: 60px;
      align-items: flex-end;
    }

    .trend-timeline-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .trend-timeline-bar {
      width: 100%;
      background: var(--accent);
      border-radius: 3px 3px 0 0;
      transition: height 0.3s ease;
    }

    .trend-timeline-label {
      font-size: 10px;
      color: var(--muted);
    }

    .trend-empty {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }

    @media (max-width: 900px) {
      .hero h1 { font-size: 22px; }
      .summary,
      .file-block { padding: 12px; }
      th, td { padding: 8px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>AI Code Review 报告</h1>
      <p class="hero-meta">服务: rps-api | 生成时间: 2026-03-16 15:22:45</p>
    </header>

    <section class="summary">
      <h2>总体结论</h2>
      <p>本次相对 tag `20260316-6605` 的 diff 为空，未发现新增或修改代码，因此无可报告问题。当前变更集在本次审查范围内结果正常。</p>
      <div class="chips">
        <span class="chip critical">Critical: 0</span>
        <span class="chip major">Major: 0</span>
        <span class="chip minor">Minor: 0</span>
        <span class="chip info">Info: 0</span>
        <span class="chip">Total: 0</span>
      </div>
    </section>

    <!-- 趋势图表区域 -->
    <section id="trends-section" class="trends-section">
      <h2>历史趋势</h2>
      <div class="trends-grid">
        <div class="trend-chart">
          <h4>平均问题分布</h4>
          <div id="avg-severity-chart">
            <div class="trend-empty">暂无历史数据</div>
          </div>
        </div>
        <div class="trend-chart">
          <h4>问题数量趋势（最近10次）</h4>
          <div id="trend-timeline-chart">
            <div class="trend-empty">暂无历史数据</div>
          </div>
        </div>
      </div>
    </section>

    <h2 class="section-title">审查发现</h2>
    <div class="empty">当前分支未发现高风险问题，或无可审查 diff。</div>
  </div>
  <script>
    (function () {
      var chips = document.querySelectorAll('table .chip');
      for (var i = 0; i < chips.length; i++) {
        chips[i].textContent = chips[i].textContent.toUpperCase();
      }

      // 渲染趋势图表
      var hasTrends = true;
      if (hasTrends) {
        var trendsSection = document.getElementById('trends-section');
        trendsSection.classList.add('visible');

        // 渲染平均严重性分布
        var avgSeverity = {&quot;critical&quot;: 0.0, &quot;major&quot;: 0.0, &quot;minor&quot;: 0.0, &quot;info&quot;: 0.0};
        var avgChart = document.getElementById('avg-severity-chart');
        if (avgSeverity && Object.keys(avgSeverity).length > 0) {
          var total = (avgSeverity.critical || 0) + (avgSeverity.major || 0) + (avgSeverity.minor || 0) + (avgSeverity.info || 0);
          var html = '';
          ['critical', 'major', 'minor', 'info'].forEach(function(sev) {
            var count = avgSeverity[sev] || 0;
            var percent = total > 0 ? Math.round((count / total) * 100) : 0;
            html += '<div class="trend-bar">' +
              '<span class="trend-bar-label">' + sev + '</span>' +
              '<div class="trend-bar-track">' +
                '<div class="trend-bar-fill ' + sev + '" style="width: ' + percent + '%"></div>' +
              '</div>' +
              '<span class="trend-bar-value">' + count + '</span>' +
            '</div>';
          });
          avgChart.innerHTML = html;
        }

        // 渲染时间趋势
        var trendData = [{&quot;timestamp&quot;: &quot;2026-03-16&quot;, &quot;total&quot;: 0, &quot;critical&quot;: 0, &quot;major&quot;: 0, &quot;minor&quot;: 0, &quot;info&quot;: 0}];
        var timelineChart = document.getElementById('trend-timeline-chart');
        if (trendData && trendData.length > 0) {
          var maxTotal = Math.max.apply(null, trendData.map(function(d) { return d.total; })) || 1;
          var html = '<div class="trend-timeline">';
          trendData.forEach(function(d) {
            var height = Math.max(5, (d.total / maxTotal) * 50);
            html += '<div class="trend-timeline-item">' +
              '<div class="trend-timeline-bar" style="height: ' + height + 'px" title="' + d.timestamp + ': ' + d.total + '个问题"></div>' +
              '<span class="trend-timeline-label">' + d.timestamp.substring(5) + '</span>' +
            '</div>';
          });
          html += '</div>';
          timelineChart.innerHTML = html;
        }
      }
    })();
  </script>
</body>
</html>
