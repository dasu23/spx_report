        }
        
        function updateEntityFilterUI() {
            const indicator = document.getElementById('entityFilterIndicator');
            if (currentEntityFilter) {
                indicator.innerHTML = `<span style="background:#6366f1;color:white;padding:4px 12px;border-radius:12px;font-size:12px;margin-right:8px;">📌 筛选: ${currentEntityFilter}</span><button class="btn btn-secondary" onclick="clearEntityFilter()" style="padding:4px 8px;font-size:11px;">✕ 清除</button>`;
                indicator.style.display = 'flex';
            } else {
                indicator.style.display = 'none';
            }
        }

        function updateStats() {
            const instances = new Set(), users = new Set();
            let sqlRows = 0, affected = 0;
            filteredData.forEach(item => {
                if (item.instance) instances.add(item.instance);
                if (item.user) users.add(item.user);
                sqlRows += item.sql_rows || 0;
                affected += item.affected_rows || 0;
            });
            document.getElementById('statTotal').textContent = filteredData.length.toLocaleString();
            document.getElementById('statInstance').textContent = instances.size;
            document.getElementById('statUser').textContent = users.size;
            document.getElementById('statSqlRows').textContent = sqlRows.toLocaleString();
            document.getElementById('statAffected').textContent = affected.toLocaleString();
            document.getElementById('tableCount').textContent = filteredData.length;
        }

        function calcDist(data, field) {
            const dist = {};
            data.forEach(item => { const val = item[field] || '未知'; dist[val] = (dist[val] || 0) + 1; });
            return Object.entries(dist).sort((a, b) => b[1] - a[1]);
        }

        function calcTrend(data) {
            const daily = {};
            data.forEach(item => { const date = (item.create_time || '').substring(0, 10); if (date) daily[date] = (daily[date] || 0) + 1; });
            const sorted = Object.entries(daily).sort((a, b) => a[0].localeCompare(b[0]));
            return { dates: sorted.map(d => d[0]), counts: sorted.map(d => d[1]) };
        }

        function calcKeywords(data) {
            const dist = {};
            data.forEach(item => {
                (item.keywords || []).forEach(kw => {
                    dist[kw] = (dist[kw] || 0) + 1;
                });
            });
            return Object.entries(dist).sort((a, b) => b[1] - a[1]);
        }
        
        // 动态计算实体统计（根据筛选后的数据）
        function calcEntityStats(data) {
            const entityStats = {};
            const actionKeywords = {"更新": ["更新", "update", "modify", "修改", "变更", "调整", "刷数据", "刷新", "correct", "同步", "sync", "迁移", "migrate", "隐藏", "upd", "轨迹脚本"], "新增": ["新增", "add", "insert", "添加", "create", "创建", "grant", "初始化", "NEW"], "删除": ["删除", "delete", "remove", "清理", "clean", "清除"], "配置": ["配置", "config", "setting", "设置"], "修复": ["修复", "fix", "repair", "hotfix", "修正", "处理", "process", "handle", "Missing", "重置", "reset", "回滚", "rollback", "恢复", "restore", "recover", "还原", "重推"], "发布": ["发布", "release", "deploy", "上线", "执行"], "查询": ["查询", "query", "search", "搜索"], "测试": ["测试", "test", "调试", "debug"], "启用": ["启用", "enable", "开启", "激活", "active", "开通"], "关闭": ["关闭", "close", "disable", "禁用", "停用"]};
            
            data.forEach(item => {
                const name = (item.workflow_name || '').toLowerCase();
                
                // 识别实体
                let matchedEntity = null;
                for (const [entity, keywords] of Object.entries(entityKeywords)) {
                    if (keywords.some(kw => name.includes(kw.toLowerCase()))) {
                        matchedEntity = entity;
                        break;
                    }
                }
                
                if (!matchedEntity) return;
                
                // 识别操作
                let matchedAction = '其他';
                for (const [action, keywords] of Object.entries(actionKeywords)) {
                    if (keywords.some(kw => name.includes(kw.toLowerCase()))) {
                        matchedAction = action;
                        break;
                    }
                }
                
                // 统计
                if (!entityStats[matchedEntity]) {
                    entityStats[matchedEntity] = { total: 0, actions: {} };
                }
                entityStats[matchedEntity].total++;
                entityStats[matchedEntity].actions[matchedAction] = (entityStats[matchedEntity].actions[matchedAction] || 0) + 1;
            });
            
            // 按总数排序
            return Object.entries(entityStats)
                .sort((a, b) => b[1].total - a[1].total)
                .reduce((acc, [k, v]) => { acc[k] = v; return acc; }, {});
        }

        function renderCharts() {
            Object.values(charts).forEach(c => c?.dispose()); charts = {};
            let colorIndex = 0;
            const getGroupColor = name => groupColors[name] || colors[colorIndex++ % colors.length];

            const groupDist = calcDist(filteredData, 'group');
            colorIndex = 0;
            charts.groupPie = echarts.init(document.getElementById('groupPieChart'));
            charts.groupPie.setOption({
                color: groupDist.map(([name]) => getGroupColor(name)),
                title: { text: '项目组分布', left: 'center', textStyle: { fontSize: 14, fontWeight: 600 } },
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                legend: { orient: 'vertical', left: 'left', top: 'middle', textStyle: { fontSize: 11 } },
                series: [{ type: 'pie', radius: ['35%', '65%'], center: ['60%', '55%'], data: groupDist.map(([name, value]) => ({ name, value })), label: { show: true, formatter: '{b}: {d}%', fontSize: 10 } }]
            });

            const typeDist = calcDist(filteredData, 'type');
            charts.type = echarts.init(document.getElementById('typePieChart'));
            charts.type.setOption({
                color: ['#6366f1', '#10b981', '#f59e0b', '#ef4444'],
                title: { text: '工单类型分布', left: 'center', textStyle: { fontSize: 14, fontWeight: 600 } },
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                legend: { orient: 'vertical', left: 'left', top: 'middle', textStyle: { fontSize: 11 } },
                series: [{ type: 'pie', radius: ['35%', '65%'], center: ['60%', '55%'], data: typeDist.map(([name, value]) => ({ name, value })), label: { show: true, formatter: '{b}: {d}%', fontSize: 10 } }]
            });

            const statusDist = calcDist(filteredData, 'status');
            charts.status = echarts.init(document.getElementById('statusPieChart'));
            charts.status.setOption({
                color: colors,
                title: { text: '工单状态分布', left: 'center', textStyle: { fontSize: 14, fontWeight: 600 } },
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                legend: { orient: 'vertical', left: 'left', top: 'middle', textStyle: { fontSize: 11 } },
                series: [{ type: 'pie', radius: ['35%', '65%'], center: ['60%', '55%'], data: statusDist.map(([name, value]) => ({ name, value })), label: { show: true, formatter: '{b}: {d}%', fontSize: 10 } }]
            });

            colorIndex = 0;
            charts.groupBar = echarts.init(document.getElementById('groupBarChart'));
            charts.groupBar.setOption({
                title: { text: '各项目组工单统计', left: 'center', textStyle: { fontSize: 14, fontWeight: 600 } },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '6%', bottom: '3%', top: '15%', containLabel: true },
                xAxis: { type: 'category', data: groupDist.map(d => d[0]), axisLabel: { fontSize: 10, rotate: 30 } },
                yAxis: { type: 'value', axisLabel: { fontSize: 10 } },
                series: [{ type: 'bar', data: groupDist.map(([name, value]) => ({ value, itemStyle: { color: getGroupColor(name), borderRadius: [4, 4, 0, 0] } })), label: { show: true, position: 'top', fontSize: 10 } }]
            });

            const trend = calcTrend(filteredData);
            charts.trend = echarts.init(document.getElementById('trendChart'));
            charts.trend.setOption({
                color: ['#6366f1'],
                title: { text: '每日工单趋势', left: 'center', textStyle: { fontSize: 14, fontWeight: 600 } },
                tooltip: { trigger: 'axis' },
                grid: { left: '3%', right: '4%', bottom: '10%', top: '15%', containLabel: true },
                xAxis: { type: 'category', data: trend.dates, boundaryGap: false, axisLabel: { fontSize: 10, rotate: trend.dates.length > 15 ? 45 : 0 } },
                yAxis: { type: 'value', axisLabel: { fontSize: 10 } },
                series: [{ name: '工单数', type: 'line', data: trend.counts, smooth: true, areaStyle: { color: 'rgba(99, 102, 241, 0.2)' }, lineStyle: { width: 2 }, symbol: 'circle', symbolSize: 6 }]
            });

            const instanceDist = calcDist(filteredData, 'instance').slice(0, 15);
            charts.instance = echarts.init(document.getElementById('instanceChart'));
            charts.instance.setOption({
                color: ['#6366f1'],
                title: { text: 'Top 15 数据库实例', left: 'center', textStyle: { fontSize: 14, fontWeight: 600 } },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '8%', bottom: '3%', top: '15%', containLabel: true },
                xAxis: { type: 'value' },
                yAxis: { type: 'category', data: instanceDist.map(d => d[0]).reverse(), axisLabel: { fontSize: 10, formatter: v => v.length > 25 ? v.slice(0, 25) + '...' : v } },
                series: [{ type: 'bar', data: instanceDist.map(d => d[1]).reverse(), itemStyle: { borderRadius: [0, 4, 4, 0] }, label: { show: true, position: 'right', fontSize: 10 } }]
            });

            const userDist = calcDist(filteredData, 'user').slice(0, 15);
            charts.user = echarts.init(document.getElementById('userChart'));
            charts.user.setOption({
                color: ['#10b981'],
                title: { text: 'Top 15 活跃用户', left: 'center', textStyle: { fontSize: 14, fontWeight: 600 } },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '8%', bottom: '3%', top: '15%', containLabel: true },
                xAxis: { type: 'value' },
                yAxis: { type: 'category', data: userDist.map(d => d[0]).reverse(), axisLabel: { fontSize: 10 } },
                series: [{ type: 'bar', data: userDist.map(d => d[1]).reverse(), itemStyle: { borderRadius: [0, 4, 4, 0] }, label: { show: true, position: 'right', fontSize: 10 } }]
            });

            // 业务实体图表 - 二级关键词结构（堆叠条形图）
            // 动态计算实体统计（根据筛选后的数据）
            const dynamicEntityData = calcEntityStats(filteredData);
            const entityEntries = Object.entries(dynamicEntityData).slice(0, 15);
            const actionColors = {
                '更新': '#6366f1', '新增': '#10b981', '删除': '#ef4444', '配置': '#8b5cf6',
                '修复': '#f97316', '发布': '#ec4899', '处理': '#14b8a6',
                '脚本': '#84cc16', '查询': '#0ea5e9', '重置': '#a855f7', '测试': '#64748b', 
                '启用': '#22c55e', '恢复': '#0891b2', '关闭': '#dc2626', '其他': '#94a3b8'
            };
            
            // 收集所有操作类型
            const allActions = new Set();
            entityEntries.forEach(([_, info]) => Object.keys(info.actions).forEach(a => allActions.add(a)));
            const actionList = Array.from(allActions);
            
            // 构建堆叠数据
            const stackSeries = actionList.map(action => ({
                name: action,
                type: 'bar',
                stack: 'total',
                data: entityEntries.map(([_, info]) => info.actions[action] || 0).reverse(),
                itemStyle: { color: actionColors[action] || '#94a3b8', borderRadius: 0 },
                label: { show: false }
            }));
            
            // 存储实体名称映射（用于点击筛选）
            const entityNameMap = {};
            entityEntries.forEach(([name, info]) => {
                entityNameMap[`${name} (${info.total})`] = name;
            });
            
            charts.keyword = echarts.init(document.getElementById('keywordChart'));
            charts.keyword.setOption({
                title: { text: '业务实体分布（点击筛选工单）', left: 'center', textStyle: { fontSize: 14, fontWeight: 600 } },
                tooltip: { 
                    trigger: 'axis', 
                    axisPointer: { type: 'shadow' },
                    formatter: params => {
                        const entity = params[0].axisValue;
                        let html = `<strong>${entity}</strong><br/>`;
                        let total = 0;
                        params.filter(p => p.value > 0).sort((a,b) => b.value - a.value).forEach(p => {
                            html += `<span style="display:inline-block;width:10px;height:10px;background:${p.color};border-radius:2px;margin-right:5px;"></span>${p.seriesName}: ${p.value}次<br/>`;
                            total += p.value;
                        });
                        html += `<strong>总计: ${total}次</strong>`;
                        html += `<br/><span style="color:#6366f1;font-size:11px;">点击筛选此实体的工单</span>`;
                        return html;
                    }
                },
                legend: { 
                    data: actionList, 
                    bottom: 0, 
                    type: 'scroll',
                    textStyle: { fontSize: 10 },
                    itemWidth: 12,
                    itemHeight: 12
                },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '15%', containLabel: true },
                xAxis: { type: 'value' },
                yAxis: { 
                    type: 'category', 
                    data: entityEntries.map(([name, info]) => `${name} (${info.total})`).reverse(), 
                    axisLabel: { fontSize: 10, formatter: v => currentEntityFilter && entityNameMap[v] === currentEntityFilter ? `► ${v}` : v } 
                },
                series: stackSeries
            });
            
            // 添加点击事件 - 筛选工单
            charts.keyword.on('click', function(params) {
                const clickedLabel = params.name;
                const entityName = entityNameMap[clickedLabel];
                if (entityName) {
                    filterByEntity(entityName);
                }
            });
        }

        function getStatusClass(status) {
            if (['异常', '不通过', '终止'].some(x => status.includes(x))) return 'status-fail';
            if (['待', '排队', '审核', '执行中', '定时'].some(x => status.includes(x))) return 'status-pending';
            return 'status-success';
        }

        function truncate(text, len) { return text && text.length > len ? text.slice(0, len) + '...' : text || ''; }

        // 获取工单的首要实体（与 calcEntityStats 逻辑一致）
        function getPrimaryEntity(workflowName) {
            const name = (workflowName || '').toLowerCase();
            for (const [entity, keywords] of Object.entries(entityKeywords)) {
                if (keywords.some(kw => name.includes(kw.toLowerCase()))) {
                    return entity;
                }
            }
            return null;
        }
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            // 应用实体筛选（使用首要实体匹配，与图表统计逻辑一致）
            let tableData = filteredData;
            if (currentEntityFilter) {
                tableData = filteredData.filter(item => {
                    return getPrimaryEntity(item.workflow_name) === currentEntityFilter;
                });
            }
            
            // 更新显示计数
            document.getElementById('tableCount').textContent = tableData.length;
            
            const displayData = tableData.slice(0, 100);
            if (displayData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="empty-state"><div class="icon">🔍</div><p>暂无匹配的数据</p></td></tr>';
                return;
            }
            let html = displayData.map(d => `<tr><td>${d.id}</td><td class="workflow-name" data-full="${(d.workflow_name || '').replace(/"/g, '&quot;')}">${truncate(d.workflow_name, 30)}</td><td><span class="status-badge ${getStatusClass(d.status)}">${d.status}</span></td><td>${d.type}</td><td><span class="group-badge">${d.group || '-'}</span></td><td title="${d.instance}">${truncate(d.instance, 20)}</td><td>${d.user}</td><td>${d.create_time}</td><td>${(d.sql_rows || 0).toLocaleString()}</td><td>${(d.affected_rows || 0).toLocaleString()}</td></tr>`).join('');
            if (tableData.length > 100) html += `<tr><td colspan="10" class="more-rows">... 还有 ${tableData.length - 100} 条记录未显示 ...</td></tr>`;
            tbody.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.date-preset[data-range]').forEach(el => el.addEventListener('click', () => setDateRange(el.dataset.range)));
            ['startDate', 'endDate'].forEach(id => document.getElementById(id).addEventListener('change', () => {
                currentDateRange = 'custom';
                document.querySelectorAll('.date-preset').forEach(el => el.classList.remove('active'));
                document.querySelector('.date-preset[data-range="custom"]').classList.add('active');
                document.getElementById('dateCustom').style.display = 'flex';
                const s = document.getElementById('startDate').value, e = document.getElementById('endDate').value;
                document.getElementById('rangeInfo').textContent = (s && e) ? `${s} ~ ${e}` : '请选择完整日期范围';
                applyFilters();
            }));
            ['groupSelect', 'typeSelect', 'instanceSelect', 'userSelect'].forEach(id => document.getElementById(id).addEventListener('change', applyFilters));
            setDateRange('last7days');
            window.addEventListener('resize', () => Object.values(charts).forEach(c => c?.resize()));
        });
    </script>
</body>
</html>
